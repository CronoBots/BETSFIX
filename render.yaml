# Blueprint Render — déploiement gratuit de l'API.
# Sur https://dashboard.render.com : New > Blueprint, puis connecte ce repo.
services:
  - type: web
    name: api-sport
    runtime: python
    plan: free
    region: frankfurt          # EU : au plus proche de la Belgique (cotes Unibet)
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
